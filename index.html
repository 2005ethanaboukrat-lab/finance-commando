<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Finance English Commando</title>
<style>
:root{
--bg:#ffffff;--bg2:#f5f5f5;--bg3:#ebebeb;--txt:#111111;--txt2:#666666;--txt3:#999999;
--border:#e0e0e0;--border2:#cccccc;--green:#16a34a;--green-bg:#f0fdf4;--green-txt:#15803d;
--red:#dc2626;--red-bg:#fef2f2;--red-txt:#b91c1c;--orange:#ea580c;--orange-bg:#fff7ed;--orange-txt:#c2410c;
--blue:#2563eb;--blue-bg:#eff6ff;--blue-txt:#1d4ed8;--radius:12px;--radius-sm:8px;
--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
--mono:'SF Mono','Cascadia Code','Fira Code',monospace;
}
[data-theme="dark"]{
--bg:#111111;--bg2:#1a1a1a;--bg3:#252525;--txt:#f0f0f0;--txt2:#a0a0a0;--txt3:#666666;
--border:#2a2a2a;--border2:#3a3a3a;--green-bg:#052e16;--green-txt:#4ade80;
--red-bg:#450a0a;--red-txt:#f87171;--orange-bg:#431407;--orange-txt:#fb923c;
--blue-bg:#172554;--blue-txt:#60a5fa;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--txt);transition:background .3s,color .3s}
.app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);position:relative;overflow:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);z-index:10}
.logo{font-weight:600;font-size:15px;letter-spacing:-.3px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-sub{font-size:12px;color:var(--txt3)}
.dm-btn{background:none;border:1px solid var(--border2);border-radius:20px;padding:4px 12px;font-size:11px;cursor:pointer;color:var(--txt2);font-family:var(--font);transition:all .2s}
.dm-btn:hover{border-color:var(--txt)}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.screen{padding:20px;animation:fadeUp .35s ease both;min-height:100%}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
@keyframes growW{from{width:0}to{width:var(--tw)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
nav{display:flex;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);z-index:10}
.tab{flex:1;text-align:center;padding:10px 0 max(12px,env(safe-area-inset-bottom));cursor:pointer;transition:all .2s;border-top:2px solid transparent;-webkit-tap-highlight-color:transparent}
.tab.active{border-top-color:var(--txt)}
.tab-icon{font-size:16px;margin-bottom:2px;color:var(--txt3);transition:color .2s}
.tab-label{font-size:11px;font-weight:500;color:var(--txt3);transition:color .2s}
.tab.active .tab-icon,.tab.active .tab-label{color:var(--txt)}
.metric{background:var(--bg2);border-radius:var(--radius-sm);padding:12px 10px;text-align:center;animation:popIn .35s ease both}
.metric-label{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.metric-val{font-size:16px;font-weight:600}
.card{padding:16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .2s,transform .15s;animation:fadeUp .35s ease both}
.card:hover{border-color:var(--border2)}
.card:active{transform:scale(.98)}
.card-title{font-size:15px;font-weight:600;margin-bottom:3px}
.card-sub{font-size:13px;color:var(--txt2)}
.btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font);transition:opacity .2s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--txt);color:var(--bg)}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:none;border:1px solid var(--border2);color:var(--txt)}
.btn-ghost:hover{background:var(--bg2)}
.section-label{font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.progress-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:4px;background:var(--txt);border-radius:2px;transition:width .6s ease}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.tag-green{background:var(--green-bg);color:var(--green-txt)}
.tag-red{background:var(--red-bg);color:var(--red-txt)}
.tag-orange{background:var(--orange-bg);color:var(--orange-txt)}
.tag-blue{background:var(--blue-bg);color:var(--blue-txt)}
input[type="text"]{width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:16px;font-family:var(--font);background:var(--bg);color:var(--txt);outline:none;transition:border-color .2s}
input[type="text"]:focus{border-color:var(--txt)}
.rating-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rating-btn{padding:14px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .2s,transform .1s;font-family:var(--font)}
.rating-btn:active{transform:scale(.96)}
.r-again{background:var(--red-bg);color:var(--red-txt)}
.r-hard{background:var(--orange-bg);color:var(--orange-txt)}
.r-good{background:var(--green-bg);color:var(--green-txt)}
.r-easy{background:var(--blue-bg);color:var(--blue-txt)}
.feedback{padding:16px;border-radius:var(--radius-sm);margin-bottom:12px;animation:popIn .3s ease both}
.feedback-ok{background:var(--green-bg);color:var(--green-txt)}
.feedback-err{background:var(--red-bg);color:var(--red-txt)}
.example-box{padding:14px;background:var(--bg2);border-radius:var(--radius-sm);margin-top:12px}
.example-label{font-size:12px;color:var(--txt3);margin-bottom:6px}
.example-text{font-size:14px;font-style:italic;line-height:1.5}
.timer-display{font-size:22px;font-weight:600;font-family:var(--mono)}
.timer-warn{color:var(--orange)}
.timer-crit{color:var(--red);animation:pulse .8s ease infinite}
.back-btn{background:none;border:none;font-size:14px;cursor:pointer;color:var(--txt2);padding:0;font-family:var(--font)}
.back-btn:hover{color:var(--txt)}
.dot-row{display:flex;gap:4px;justify-content:center;margin-top:20px;flex-wrap:wrap}
.dot{width:6px;height:6px;border-radius:50%;transition:all .3s}
.tutor-card{padding:16px;border:2px solid var(--txt);border-radius:var(--radius);animation:fadeUp .35s ease both}
.ring-container{position:relative;width:130px;height:130px;margin:0 auto}
.ring-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.hidden{display:none!important}
@media(max-width:480px){.app{max-width:100%}}

/* ── NOUVEAUX MODES ── */
.mode-card{padding:18px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:border-color .2s,transform .15s,background .2s;animation:fadeUp .35s ease both;position:relative;overflow:hidden}
.mode-card:hover{border-color:var(--border2);background:var(--bg2)}
.mode-card:active{transform:scale(.98)}
.mode-card-icon{width:38px;height:38px;border-radius:10px;background:var(--bg3);display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.mode-card-title{font-size:15px;font-weight:600;margin-bottom:3px}
.mode-card-sub{font-size:13px;color:var(--txt2);line-height:1.4}
.mode-badge{position:absolute;top:14px;right:14px;font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px;letter-spacing:.4px}

/* Scene mode */
.scene-img{width:100%;border-radius:var(--radius);aspect-ratio:4/3;object-fit:cover;background:var(--bg3);display:block}
.scene-placeholder{width:100%;aspect-ratio:4/3;border-radius:var(--radius);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.ai-feedback{padding:14px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-top:12px;animation:popIn .3s ease both;line-height:1.6;font-size:14px}
.score-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:15px;font-weight:600;margin-bottom:10px}

/* Blitz mode */
.blitz-word{font-size:36px;font-weight:700;text-align:center;letter-spacing:-.5px;line-height:1.1;padding:8px 0}
.blitz-hint{font-size:13px;color:var(--txt3);text-align:center;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.blitz-timer-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:20px}
.blitz-timer-fill{height:6px;border-radius:3px;background:var(--txt);transition:width .1s linear;transform-origin:left}
.blitz-score-big{font-size:72px;font-weight:700;text-align:center;letter-spacing:-2px;line-height:1;font-family:var(--mono)}
.blitz-record-label{font-size:13px;text-align:center;color:var(--txt3);margin-top:4px}
.blitz-cat-btn{padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;background:var(--bg);color:var(--txt);font-family:var(--font);display:flex;align-items:center;justify-content:space-between;animation:fadeUp .35s ease both}
.blitz-cat-btn:hover{background:var(--bg2);border-color:var(--border2)}
.blitz-cat-btn:active{transform:scale(.98)}
.blitz-input{font-size:22px;text-align:center;padding:16px;border:2px solid var(--border2);font-family:var(--font)}
.blitz-input:focus{border-color:var(--txt)}

/* Confetti */
.confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;overflow:hidden}
.confetti-piece{position:absolute;width:8px;height:8px;top:-10px;animation:confettiFall linear forwards}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes recordPop{0%{transform:scale(1)}40%{transform:scale(1.15)}70%{transform:scale(.95)}100%{transform:scale(1)}}
.record-flash{animation:recordPop .5s ease both}

/* Loading spinner */
.spinner{width:24px;height:24px;border:2px solid var(--bg3);border-top-color:var(--txt);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Streak pill anti-friction */
.streak-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;background:var(--bg2);border-radius:20px;font-size:13px;font-weight:500}
.streak-fire{width:14px;height:14px}
.quick-win{padding:14px 16px;border-radius:var(--radius-sm);background:var(--bg2);border-left:3px solid var(--txt);margin-bottom:16px;font-size:14px;line-height:1.5}

/* ── FLIP CARD 3D ── */
.flip-scene{perspective:900px;width:100%}
.flip-card{width:100%;min-height:140px;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1);cursor:pointer}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-face{position:absolute;width:100%;min-height:140px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;text-align:center}
.flip-front{background:var(--bg2)}
.flip-back{background:var(--bg3);transform:rotateY(180deg)}

/* ── STREAK CALENDAR ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day{aspect-ratio:1;border-radius:3px;background:var(--bg3)}
.cal-day.active{background:var(--txt)}
.cal-day.today{box-shadow:0 0 0 2px var(--txt)}

/* ── FAVORITES ── */
.fav-btn{background:none;border:none;cursor:pointer;padding:4px;color:var(--txt3);transition:color .2s;line-height:1}
.fav-btn.active{color:var(--txt)}

/* ── SPEECH ── */
.speech-indicator{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:12px;background:var(--bg3);color:var(--txt2)}
.speech-wave{display:flex;align-items:center;gap:2px;height:14px}
.speech-wave span{display:block;width:2px;background:var(--txt);border-radius:1px;animation:wavePulse 1s ease infinite}
.speech-wave span:nth-child(2){animation-delay:.15s}
.speech-wave span:nth-child(3){animation-delay:.3s}
@keyframes wavePulse{0%,100%{height:4px}50%{height:12px}}

/* ── NOTIF SETTINGS ── */
.notif-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.toggle{width:42px;height:24px;background:var(--bg3);border-radius:12px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.toggle.on{background:var(--txt)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:var(--bg);border-radius:50%;transition:transform .2s}
.toggle.on::after{transform:translateX(18px)}

/* ── MOT DU FILM ── */
.word-card{padding:16px;background:var(--bg2);border-radius:var(--radius);margin-bottom:10px;animation:fadeUp .3s ease both;border-left:3px solid var(--border2)}
.word-card.mastered{border-left-color:var(--green)}
.word-card.learning{border-left-color:var(--orange)}
.word-card-new{border-left-color:var(--txt3)}
.word-en{font-size:18px;font-weight:700;letter-spacing:-.3px}
.word-fr{font-size:14px;color:var(--txt2);margin-top:2px}
.word-meta{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;align-items:center}
.word-pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.4px;background:var(--bg3);color:var(--txt2)}
.lookup-input{font-size:20px;font-weight:600;padding:14px 16px;letter-spacing:-.3px}
.lookup-result{padding:18px;background:var(--bg2);border-radius:var(--radius);animation:popIn .3s ease;border:1px solid var(--border)}

</head>
<body>
<div class="app" id="app">
  <header>
    <span class="logo">Finance Commando</span>
    <div class="hdr-right">
      <span class="hdr-sub" id="hdr-sub"></span>
      <button class="dm-btn" id="dm-btn" onclick="toggleDark()">dark</button>
    </div>
  </header>
  <main id="main"></main>
  <nav id="nav"></nav>
</div>
<script src="vocab_db_final.js"></script>
<script>
// ═══════════════════════════════════════
// CONFIG — clé API Anthropic
// ═══════════════════════════════════════
// Pour utiliser les modes IA (Scène, Traduction) :
// Renseigne ta clé ici ou dans localStorage: fec_apikey
const API_KEY_STORAGE = 'fec_apikey';
function getApiKey(){ return localStorage.getItem(API_KEY_STORAGE)||''; }
function setApiKey(k){ localStorage.setItem(API_KEY_STORAGE,k); }

// Patch fetch pour injecter la clé automatiquement
const _origFetch = window.fetch.bind(window);
window.fetch = function(url, opts={}){
  if(typeof url==='string' && url.includes('anthropic.com')){
    const key = getApiKey();
    if(key){
      opts.headers = {...(opts.headers||{}), 'x-api-key':key, 'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'};
    }
  }
  return _origFetch(url, opts);
};


const RANKS = ['Stagiaire','Analyste','Associate','VP','Director','MD','Partner','Légende'];
const RANK_XP = [0,200,600,1200,2500,5000,10000,20000];
const LEVELS = ['A2','A2+','B1','B1-','B1','B1+','B2-','B2','B2+','C1-','C1','C1+','C2'];

let S = loadState();
let currentView = 'home';
let drillState = null;

function defaultState(){
  return {
    placed:false, level:'A2', xp:0, streak:0, lastDay:null,
    cardsUnlocked:150, newPerDay:10, verbEmergency:false,
    cards:{}, testHistory:[], darkMode:true,
    totalReviews:0, correctReviews:0,
    favorites:{}, activityLog:[], notifTime:'20:00', notifEnabled:false,
    speechEnabled:true, myWords:{}
  };
}

function loadState(){
  try{ const s=JSON.parse(localStorage.getItem('fec_state')); return s && s.xp!==undefined ? s : defaultState(); }
  catch(e){ return defaultState(); }
}
function saveState(){ localStorage.setItem('fec_state', JSON.stringify(S)); }

function today(){ return new Date().toISOString().slice(0,10); }

function updateStreak(){
  const t = today();
  if(S.lastDay === t) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yesterday = y.toISOString().slice(0,10);
  if(S.lastDay === yesterday){ S.streak++; }
  else if(S.lastDay !== t){ S.streak = 1; }
  S.lastDay = t;
  saveState();
}

function addXP(n){
  S.xp += n;
  updateStreak();
  saveState();
}

function getRank(){
  let r = 0;
  for(let i=RANK_XP.length-1;i>=0;i--){ if(S.xp>=RANK_XP[i]){r=i;break;} }
  return RANKS[r];
}

function getLevelIndex(){
  return Math.max(0, LEVELS.indexOf(S.level));
}

function getMastered(){
  return Object.values(S.cards).filter(c=>c.reps>=3 && c.stability>30).length;
}

// ═══════════════════════════════════════
// FSRS-5 ENGINE
// ═══════════════════════════════════════
const FSRS = {
  w:[.4,1.18,3.17,15.69,.46,1.03,.93,.08,1.53,.1,.78,2.07,.14,.26,2.2,.02,3.],
  targetR: 0.9,

  initCard(){ return {stability:0, difficulty:0, reps:0, lapses:0, state:'new', lastReview:null, due:null, elapsed:0}; },

  getRetrievability(card){
    if(!card.lastReview || card.stability<=0) return 0;
    const elapsed = (Date.now()-new Date(card.lastReview).getTime())/(1000*60*60*24);
    return Math.pow(1 + elapsed/(9*card.stability), -1);
  },

  initDifficulty(rating){
    return Math.max(1, Math.min(10, this.w[4] - Math.exp(this.w[5]*(rating-1)) + 1));
  },

  initStability(rating){
    return Math.max(.1, this.w[rating-1]);
  },

  nextDifficulty(d, rating){
    const nd = d - this.w[6]*(rating-3);
    return Math.max(1, Math.min(10, this.w[7]*this.initDifficulty(3) + (1-this.w[7])*nd));
  },

  nextStabilitySuccess(d, s, r, rating){
    const hardPenalty = rating===2 ? this.w[15] : 1;
    const easyBonus = rating===4 ? this.w[16] : 1;
    return s * (1 + Math.exp(this.w[8]) * (11-d) * Math.pow(s,-this.w[9]) *
           (Math.exp((1-r)*this.w[10])-1) * hardPenalty * easyBonus);
  },

  nextStabilityFail(d, s, r){
    return Math.max(.1, this.w[11] * Math.pow(d,-this.w[12]) *
           (Math.pow(s+1,this.w[13])-1) * Math.exp((1-r)*this.w[14]));
  },

  nextInterval(s){
    return Math.max(1, Math.round(s * 9 * (1/this.targetR - 1)));
  },

  review(card, rating){
    const c = {...card};
    const now = new Date();

    if(c.state==='new'){
      c.difficulty = this.initDifficulty(rating);
      c.stability = this.initStability(rating);
      c.reps = rating>=2 ? 1 : 0;
      c.lapses = rating===1 ? 1 : 0;
      c.state = rating===1 ? 'learning' : 'review';
    } else {
      const r = this.getRetrievability(c);
      c.difficulty = this.nextDifficulty(c.difficulty, rating);

      if(rating===1){
        c.stability = this.nextStabilityFail(c.difficulty, c.stability, r);
        c.lapses++;
        c.state = 'relearning';
      } else {
        c.stability = this.nextStabilitySuccess(c.difficulty, c.stability, r, rating);
        c.reps++;
        c.state = 'review';
      }
    }

    c.lastReview = now.toISOString();
    if(rating===1){
      c.due = new Date(now.getTime()+10*60*1000).toISOString();
    } else {
      const interval = this.nextInterval(c.stability);
      c.due = new Date(now.getTime()+interval*24*60*60*1000).toISOString();
    }
    c.elapsed = 0;
    return c;
  }
};

function getCardState(id){
  if(!S.cards[id]) S.cards[id] = FSRS.initCard();
  return S.cards[id];
}

function reviewCard(id, rating){
  const card = getCardState(id);
  S.cards[id] = FSRS.review(card, rating);
  S.totalReviews++;
  if(rating>=2) S.correctReviews++;
  addXP(rating===1?1:rating===2?2:rating===3?5:8);
  saveState();
}

// ═══════════════════════════════════════
// DATA HELPERS
// ═══════════════════════════════════════
function getAllCards(){
  const all = [];
  VOCAB_DB.verbs.forEach(v => all.push({...v, type:'verb', display:v.infinitive}));
  VOCAB_DB.finance.forEach(f => all.push({...f, type:'finance', display:f.word}));
  VOCAB_DB.general.forEach(g => all.push({...g, type:'general', display:g.word}));
  return all;
}

function getDueCards(){
  const now = Date.now();
  return getAllCards().filter(c => {
    const state = getCardState(c.id);
    if(state.state==='new') return false;
    if(!state.due) return false;
    return new Date(state.due).getTime() <= now;
  });
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ═══════════════════════════════════════
function startLearn(type){
  let cards;
  if(type==='verbs'){
    cards = shuffle(VOCAB_DB.verbs).slice(0,12).map(v=>({
      id:v.id, type:'verb',
      front: v.infinitive,
      frontSub: v.fr,
      back: `${v.past} / ${v.pp}`,
      example: v.example,
      exampleFr: v.exampleFr,
      level: v.level
    }));
  } else {
    const pool = shuffle([...VOCAB_DB.finance,...VOCAB_DB.general]);
    // Prioritise unseen cards
    const unseen = pool.filter(w=>{ const c=S.cards[w.id]; return !c||c.state==='new'; });
    const seen = pool.filter(w=>{ const c=S.cards[w.id]; return c&&c.state!=='new'; });
    cards = [...unseen,...seen].slice(0,12).map(w=>({
      id:w.id, type: w.definition?'finance':'general',
      front: w.word,
      frontSub: w.definition||'',
      back: w.fr,
      example: w.example,
      exampleFr: w.exampleFr||'',
      level: w.level
    }));
  }
  drillState = {mode:'learn', type, cards, ci:0, flipped:false, seen:0};
  render();
}

function learnReveal(){
  drillState.flipped = true;
  render();
}

function learnNext(known){
  const ds = drillState;
  const card = ds.cards[ds.ci];
  // Mark as "seen" in FSRS without penalising — just initialise
  if(!S.cards[card.id]){
    S.cards[card.id] = FSRS.initCard();
    S.cards[card.id].state = 'learning';
  }
  if(known){ addXP(2); if(ds.seen!==undefined) ds.seen++; }
  ds.ci++;
  ds.flipped = false;
  render();
}

function finishLearn(){
  const ds = drillState;
  const known = ds.seen||0;
  addXP(10);
  saveState();
  drillState = {mode:'learn-result', type:ds.type, total:ds.cards.length, known};
  render();
}

// ═══════════════════════════════════════
// PLACEMENT TEST
// ═══════════════════════════════════════
function startPlacement(){
  const verbQ = shuffle(VOCAB_DB.verbs).slice(0,12).map(v=>({
    type:'verb-input', verb:v, q:`Quel est le prétérit de "${v.infinitive}" ?`, answer:v.past.split('/')[0]
  }));
  const finQ = shuffle(VOCAB_DB.finance).slice(0,12).map(f=>{
    const wrong = shuffle(VOCAB_DB.finance.filter(x=>x.id!==f.id)).slice(0,3).map(x=>x.fr);
    const opts = shuffle([f.fr, ...wrong]);
    return {type:'mcq', q:`Que signifie "${f.word}" ?`, opts, correct:opts.indexOf(f.fr), item:f};
  });
  const compQ = shuffle(VOCAB_DB.finance).slice(0,11).map(f=>{
    const wrong = shuffle(VOCAB_DB.finance.filter(x=>x.id!==f.id)).slice(0,3).map(x=>x.word);
    const opts = shuffle([f.word, ...wrong]);
    return {type:'mcq', q:f.definition, opts, correct:opts.indexOf(f.word), item:f};
  });

  drillState = {
    mode:'placement', questions:[...verbQ,...finQ,...compQ], qi:0, score:0,
    roundScores:[0,0,0], roundTotals:[12,12,11], round:1
  };
  render();
}

function startProgressTest(){
  const verbQ = shuffle(VOCAB_DB.verbs).slice(0,15).map(v=>({
    type:'verb-input', verb:v, q:`Prétérit de "${v.infinitive}" ?`, answer:v.past.split('/')[0]
  }));
  const genQ = shuffle(VOCAB_DB.general).slice(0,12).map(g=>{
    const wrong = shuffle(VOCAB_DB.general.filter(x=>x.id!==g.id)).slice(0,3).map(x=>x.fr);
    const opts = shuffle([g.fr,...wrong]);
    return {type:'mcq',q:`Que signifie "${g.word}" ?`,opts,correct:opts.indexOf(g.fr),item:g};
  });
  const finQ = shuffle(VOCAB_DB.finance).slice(0,12).map(f=>{
    const wrong = shuffle(VOCAB_DB.finance.filter(x=>x.id!==f.id)).slice(0,3).map(x=>x.fr);
    const opts = shuffle([f.fr,...wrong]);
    return {type:'mcq',q:`Que signifie "${f.word}" ?`,opts,correct:opts.indexOf(f.fr),item:f};
  });
  const compQ = shuffle(VOCAB_DB.finance).slice(0,11).map(f=>{
    const wrong = shuffle(VOCAB_DB.finance.filter(x=>x.id!==f.id)).slice(0,3).map(x=>x.word);
    const opts = shuffle([f.word,...wrong]);
    return {type:'mcq',q:f.definition,opts,correct:opts.indexOf(f.word),item:f};
  });

  drillState = {
    mode:'progress', questions:[...verbQ,...genQ,...finQ,...compQ], qi:0, score:0,
    roundScores:[0,0,0,0], roundTotals:[15,12,12,11], round:1,
    startTime:Date.now(), timeLimit:15*60
  };
  render();
}

// ═══════════════════════════════════════
// VERB DRILL
// ═══════════════════════════════════════
function startVerbDrill(){
  const verbs = shuffle(VOCAB_DB.verbs).slice(0,20);
  drillState = {mode:'verb', verbs, vi:0, feedback:null, retypeCount:0, retypeTarget:'', showNext:false};
  render();
}

// ═══════════════════════════════════════
// PRESSURE TEST
// ═══════════════════════════════════════
function startPressure(){
  const cards = shuffle(getAllCards()).slice(0,20);
  drillState = {
    mode:'pressure', cards, ci:0, revealed:false, score:0,
    startTime:Date.now(), timeLimit:360, timerInterval:null, elapsed:0
  };
  startPressureTimer();
  render();
}

function startPressureTimer(){
  if(drillState.timerInterval) clearInterval(drillState.timerInterval);
  drillState.timerInterval = setInterval(()=>{
    if(!drillState || drillState.mode!=='pressure') return clearInterval(drillState?.timerInterval);
    drillState.elapsed = Math.floor((Date.now()-drillState.startTime)/1000);
    const remaining = drillState.timeLimit - drillState.elapsed;
    if(remaining <= 0){
      clearInterval(drillState.timerInterval);
      finishPressure();
      return;
    }
    const timerEl = document.getElementById('pressure-timer');
    if(timerEl){
      const m=Math.floor(remaining/60), s=String(remaining%60).padStart(2,'0');
      timerEl.textContent = `${m}:${s}`;
      timerEl.className = 'timer-display' + (remaining<=30?' timer-crit':remaining<=90?' timer-warn':'');
    }
  }, 1000);
}

// ═══════════════════════════════════════
// DRILL RENDERER
// ═══════════════════════════════════════
function renderDrill(m){
  if(!drillState) return;
  switch(drillState.mode){
    case 'placement': case 'progress': renderTestQuestion(m); break;
    case 'verb': renderVerbDrill(m); break;
    case 'pressure': renderPressureDrill(m); break;
    case 'placement-result': renderPlacementResult(m); break;
    case 'progress-result': renderProgressResult(m); break;
    case 'pressure-result': renderPressureResult(m); break;
    case 'scene': renderSceneMode(m); break;
    case 'translate': renderTranslateMode(m); break;
    case 'blitz': renderBlitzMode(m); break;
    case 'blitz-result': renderBlitzResult(m); break;
    case 'learn': renderLearnMode(m); break;
    case 'learn-result': renderLearnResult(m); break;
    case 'listen': renderListenMode(m); break;
    case 'wordlookup': renderWordLookup(m); break;
    case 'mywords-learn': renderLearnMode(m); break;
  }
  renderNav();
}

function renderTestQuestion(m){
  const ds = drillState;
  const isProgress = ds.mode==='progress';
  const totalQ = ds.questions.length;

  if(ds.qi >= totalQ){
    if(isProgress) finishProgressTest();
    else finishPlacement();
    return;
  }

  const q = ds.questions[ds.qi];
  const roundNames = isProgress ? ['Verbes','Vocabulaire','Finance','Compréhension'] : ['Verbes','Vocabulaire','Compréhension'];
  let roundIdx = 0, cumul = 0;
  for(let i=0; i<ds.roundTotals.length; i++){
    if(ds.qi < cumul+ds.roundTotals[i]){ roundIdx=i; break; }
    cumul += ds.roundTotals[i];
  }
  ds.round = roundIdx+1;

  const timeStr = isProgress ? (() => {
    const elapsed = Math.floor((Date.now()-ds.startTime)/1000);
    const rem = Math.max(0, ds.timeLimit-elapsed);
    return `${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}`;
  })() : '';

  document.getElementById('hdr-sub').textContent = isProgress ? 'Test de progression' : 'Test de placement';

  m.innerHTML = `<div class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <button class="back-btn" onclick="exitDrill()">← Retour</button>
      ${isProgress?`<span class="timer-display" style="font-size:16px">${timeStr}</span>`:''}
      <span style="font-size:13px;color:var(--txt3)">${ds.qi+1}/${totalQ}</span>
    </div>
    <div class="progress-track" style="margin-bottom:6px">
      <div class="progress-fill" style="width:${Math.round(ds.qi/totalQ*100)}%"></div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:24px">
      ${roundNames.map((n,i)=>`<span style="font-size:11px;color:${i===roundIdx?'var(--txt)':'var(--txt3)'};font-weight:${i===roundIdx?'600':'400'}">${n}${i<roundIdx?' ✓':''}</span>`).join('')}
    </div>
    <p style="font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Round ${ds.round} · ${roundNames[roundIdx]}</p>
    <p style="font-size:18px;font-weight:500;margin-bottom:24px;line-height:1.4">${q.q}</p>
    ${q.type==='verb-input' ? `
      <input type="text" id="test-input" placeholder="Tape ta réponse..." autofocus onkeydown="if(event.key==='Enter')submitTestAnswer()">
      <button class="btn btn-primary" style="margin-top:12px" onclick="submitTestAnswer()">Valider</button>
    ` : `
      <div style="display:flex;flex-direction:column;gap:8px">
        ${q.opts.map((o,i)=>`<button class="btn btn-ghost" style="text-align:left;animation:slideIn .3s ease ${.05+i*.06}s both" onclick="submitMCQ(${i})">${o}</button>`).join('')}
      </div>
    `}
  </div>`;

  if(q.type==='verb-input') setTimeout(()=>document.getElementById('test-input')?.focus(),100);
}

function submitTestAnswer(){
  const input = document.getElementById('test-input');
  if(!input) return;
  const answer = input.value.trim().toLowerCase();
  const q = drillState.questions[drillState.qi];
  if(answer === q.answer.toLowerCase()){
    drillState.score++;
    updateRoundScore(true);
  } else {
    updateRoundScore(false);
  }
  drillState.qi++;
  render();
}

function submitMCQ(idx){
  const q = drillState.questions[drillState.qi];
  if(idx === q.correct){
    drillState.score++;
    updateRoundScore(true);
  } else {
    updateRoundScore(false);
  }
  drillState.qi++;
  render();
}

function updateRoundScore(correct){
  let cumul=0, roundIdx=0;
  for(let i=0;i<drillState.roundTotals.length;i++){
    if(drillState.qi < cumul+drillState.roundTotals[i]){roundIdx=i;break;}
    cumul+=drillState.roundTotals[i];
  }
  if(correct) drillState.roundScores[roundIdx]++;
}

function finishPlacement(){
  const pct = Math.round(drillState.score/drillState.questions.length*100);
  let level;
  if(pct>=90) level='C1';
  else if(pct>=80) level='B2+';
  else if(pct>=70) level='B2';
  else if(pct>=60) level='B1+';
  else if(pct>=50) level='B1';
  else if(pct>=40) level='A2+';
  else level='A2';

  const verbPct = drillState.roundTotals[0]>0 ? drillState.roundScores[0]/drillState.roundTotals[0] : 1;

  S.placed = true;
  S.level = level;
  S.verbEmergency = verbPct < .3;
  S.cardsUnlocked = pct>=80 ? 448 : pct>=60 ? 300 : 150;
  S.newPerDay = pct>=80 ? 20 : pct>=60 ? 15 : 10;
  addXP(50);
  saveState();

  drillState = {
    mode:'placement-result', score:drillState.score, total:drillState.questions.length,
    pct, level, verbPct:Math.round(verbPct*100),
    roundScores:drillState.roundScores, roundTotals:drillState.roundTotals,
    roundNames:['Verbes irréguliers','Vocabulaire','Compréhension']
  };
  render();
}

function finishProgressTest(){
  const pct = Math.round(drillState.score/drillState.questions.length*100);
  let level;
  if(pct>=90) level='C1+';
  else if(pct>=82) level='C1';
  else if(pct>=75) level='B2+';
  else if(pct>=68) level='B2';
  else if(pct>=60) level='B1+';
  else if(pct>=50) level='B1';
  else if(pct>=40) level='A2+';
  else level='A2';

  const prevLevel = S.level;
  S.level = level;
  S.testHistory.push({date:today(), pct, level});
  addXP(80);
  saveState();

  drillState = {
    mode:'progress-result', score:drillState.score, total:drillState.questions.length,
    pct, level, prevLevel,
    roundScores:drillState.roundScores, roundTotals:drillState.roundTotals,
    roundNames:['Verbes irréguliers','Vocabulaire général','Termes finance','Compréhension']
  };
  render();
}

// VERB DRILL RENDERER

function renderVerbDrill(m){

  if(ds.vi >= ds.verbs.length){ finishVerbDrill(); return; }
  const v = ds.verbs[ds.vi];
  document.getElementById('hdr-sub').textContent = 'Verbes irréguliers';

  m.innerHTML = `<div class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <button class="back-btn" onclick="exitDrill()">← Retour</button>
      <span style="font-size:13px;color:var(--txt3)">${ds.vi+1} / ${ds.verbs.length}</span>
    </div>
    <div class="progress-track" style="margin-bottom:24px"><div class="progress-fill" style="width:${Math.round(ds.vi/ds.verbs.length*100)}%"></div></div>
    <p style="font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Verbe irrégulier</p>

    ${ds.feedback ? renderVerbFeedback(v) : `

        <label style="font-size:12px;color:var(--txt3);display:block;margin-bottom:6px">Prétérit</label>
        <input type="text" id="verb-past" placeholder="Tape ici..." autofocus onkeydown="if(event.key==='Enter')document.getElementById('verb-pp').focus()">
      </div>
      <div style="margin-bottom:20px">
        <label style="font-size:12px;color:var(--txt3);display:block;margin-bottom:6px">Participe passé</label>
        <input type="text" id="verb-pp" placeholder="Tape ici..." onkeydown="if(event.key==='Enter')checkVerb()">
      </div>
      <button class="btn btn-primary" onclick="checkVerb()">Vérifier</button>
    `}
  </div>`;

  if(!ds.feedback) setTimeout(()=>document.getElementById('verb-past')?.focus(),100);
}

function checkVerb(){
  const ds = drillState;
  const v = ds.verbs[ds.vi];
  const pastInput = document.getElementById('verb-past')?.value.trim().toLowerCase() || '';
  const ppInput = document.getElementById('verb-pp')?.value.trim().toLowerCase() || '';

  const pastCorrect = v.past.toLowerCase().split('/').some(p=>p.trim()===pastInput);
  const ppCorrect = v.pp.toLowerCase().split('/').some(p=>p.trim()===ppInput);

  if(pastCorrect && ppCorrect){
    ds.feedback = 'correct';
    ds.showNext = true;
    reviewCard(v.id, 3);
  } else {
    ds.feedback = 'wrong';
    ds.showNext = false;
    ds.retypeCount = 0;
    ds.retypeTarget = `${v.past} / ${v.pp}`;
    reviewCard(v.id, 1);
  }
  render();
}

function renderVerbFeedback(v){
  const ds = drillState;
  if(ds.feedback==='correct'){
    return `<div class="feedback feedback-ok"><p style="font-size:15px;font-weight:500">Correct !</p></div>
      <div class="example-box"><p class="example-label">Exemple finance</p><p class="example-text">${v.example}</p>
        <p style="font-size:13px;color:var(--txt2);margin-top:8px">${v.exampleFr}</p></div>
      <button class="btn btn-ghost" style="margin-top:14px" onclick="nextVerb()">Verbe suivant →</button>`;
  }

  if(ds.retypeCount >= 3){
    return `<div class="feedback feedback-ok"><p style="font-size:15px;font-weight:500">Bien retapé ! Memorisé.</p></div>
      <div class="example-box"><p class="example-label">Exemple finance</p><p class="example-text">${v.example}</p>
        <p style="font-size:13px;color:var(--txt2);margin-top:8px">${v.exampleFr}</p></div>
      <button class="btn btn-ghost" style="margin-top:14px" onclick="nextVerb()">Verbe suivant →</button>`;
  }

  return `<div class="feedback feedback-err">
      <p style="font-size:15px;font-weight:500">${v.past} / ${v.pp}</p>
      <p style="font-size:13px;margin-top:4px">Retape la forme correcte (${3-ds.retypeCount} fois restantes)</p>
    </div>
    <input type="text" id="retype-input" placeholder="${v.past} / ${v.pp}" autofocus
      onkeydown="if(event.key==='Enter')checkRetype()">
    <button class="btn btn-primary" style="margin-top:12px" onclick="checkRetype()">Valider</button>
    <div class="example-box" style="margin-top:12px"><p class="example-label">Exemple finance</p><p class="example-text">${v.example}</p></div>`;
}

function checkRetype(){
  const input = document.getElementById('retype-input');
  if(!input) return;
  const val = input.value.trim().toLowerCase();
  const v = drillState.verbs[drillState.vi];
  const target = `${v.past.split('/')[0]} / ${v.pp.split('/')[0]}`.toLowerCase();

  if(val === target || val === v.past.toLowerCase() || val === v.pp.toLowerCase()){
    drillState.retypeCount++;
  } else {
    input.style.animation = 'shake .4s ease';
    setTimeout(()=>input.style.animation='',400);
  }
  input.value = '';
  render();
}

function nextVerb(){
  drillState.vi++;
  drillState.feedback = null;
  drillState.showNext = false;
  render();
}

function finishVerbDrill(){
  addXP(30);
  drillState = null;
  currentView = 'home';
  render();
}

// ═══════════════════════════════════════
// PRESSURE TEST RENDERER
// ═══════════════════════════════════════
function renderPressureDrill(m){
  const ds = drillState;
  if(ds.ci >= ds.cards.length){ finishPressure(); return; }
  const c = ds.cards[ds.ci];
  const remaining = Math.max(0, ds.timeLimit - Math.floor((Date.now()-ds.startTime)/1000));
  const min = Math.floor(remaining/60);
  const sec = String(remaining%60).padStart(2,'0');
  const timerClass = remaining<=30?'timer-crit':remaining<=90?'timer-warn':'';
  document.getElementById('hdr-sub').textContent = 'Pressure test';

  m.innerHTML = `<div class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <button class="back-btn" onclick="exitDrill()">← Retour</button>
      <span id="pressure-timer" class="timer-display ${timerClass}">${min}:${sec}</span>
      <span style="font-size:13px;color:var(--txt3)">${ds.ci+1}/20</span>
    </div>
    <div class="progress-track" style="margin-bottom:24px"><div class="progress-fill" style="width:${Math.round(ds.ci/ds.cards.length*100)}%"></div></div>

    <p style="font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${c.type==='verb'?'Verbe':'Définir'}</p>
    <p style="font-size:24px;font-weight:600;margin-bottom:12px">${c.display}</p>
    <p style="font-size:14px;color:var(--txt2);margin-bottom:8px">${c.fr}</p>

    ${ds.revealed ? `
      <div style="padding:14px;background:var(--bg2);border-radius:var(--radius-sm);margin-bottom:20px">
        <p style="font-size:14px;line-height:1.5">${c.definition || (c.type==='verb'?`${c.past} / ${c.pp}`:'')}</p>
        <p style="font-size:13px;color:var(--txt2);margin-top:8px;font-style:italic">${c.example}</p>
      </div>
      <div class="rating-grid">
        <button class="rating-btn r-again" onclick="ratePressure(1)">Again</button>
        <button class="rating-btn r-hard" onclick="ratePressure(2)">Hard</button>
        <button class="rating-btn r-good" onclick="ratePressure(3)">Good</button>
        <button class="rating-btn r-easy" onclick="ratePressure(4)">Easy</button>
      </div>
    ` : `
      <button class="btn btn-primary" style="margin-top:20px" onclick="revealPressure()">Révéler la réponse</button>
    `}
  </div>`;
}

function revealPressure(){ drillState.revealed = true; render(); }

function ratePressure(rating){
  const c = drillState.cards[drillState.ci];
  reviewCard(c.id, rating);
  if(rating>=2) drillState.score++;
  drillState.ci++;
  drillState.revealed = false;
  render();
}

function finishPressure(){
  if(drillState.timerInterval) clearInterval(drillState.timerInterval);
  const score = drillState.score || 0;
  const total = drillState.cards?.length || 20;
  addXP(40);
  drillState = {mode:'pressure-result', score, total, pct:Math.round(score/total*100)};

}

function renderLevelHistoryChart(history){
  if(history.length<1) return '';
  const W=340, H=130, pad=36;
  const levels = history.map(t=>LEVELS.indexOf(t.level));
  const maxL = Math.max(...levels,1);
  const pts = history.map((t,i)=>({
    x: pad + i*((W-pad*2)/Math.max(1,history.length-1)),
    y: H-18 - (levels[i]/Math.max(maxL,1))*(H-36),
    t
  }));
  if(pts.length===1) pts[0].x=W/2;
  const line = pts.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ');
  const timeLabels = ['Aujourd\'hui','2 sem.','1 mois','6 sem.','2 mois','3 mois'];

  return `<div style="margin-bottom:24px;animation:fadeUp .35s ease .1s both">
    <p style="font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Historique des niveaux</p>
    <div style="background:var(--bg2);border-radius:var(--radius);padding:16px">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;overflow:visible">
        ${[25,50,75].map(v=>{
          const y=H-18-(v/100)*(H-36);
          return `<line x1="${pad}" y1="${y}" x2="${W-pad}" y2="${y}" stroke="var(--border)" stroke-width="0.8" stroke-dasharray="4,4"/>
            <text x="${pad-4}" y="${y+4}" font-size="9" fill="var(--txt3)" font-family="var(--mono)" text-anchor="end">${v}</text>`;
        }).join('')}
        <path d="${line}" fill="none" stroke="var(--txt)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        ${pts.map((p,i)=>`
          <circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--bg)" stroke="var(--txt)" stroke-width="2"/>
          <text x="${p.x}" y="${p.y-10}" font-size="10" fill="var(--txt)" text-anchor="middle" font-weight="600">${p.t.level}</text>
          <text x="${p.x}" y="${H}" font-size="9" fill="var(--txt3)" text-anchor="middle">${timeLabels[i]||''}</text>
        `).join('')}
      </svg>
    </div>
  </div>`;
}

function renderSkillRadar(now, prev){
  const W=300, CX=150, CY=160, R=95;
  // 4 axes: top=Verbs, right=Vocab, bottom=Finance, left=Comprehension
  const axes = [
    {label:'Verbs',   ax:0, ay:-1, val:now.verbs},
    {label:'Vocab',   ax:1, ay:0,  val:now.vocab},
    {label:'Finance', ax:0, ay:1,  val:now.finance},
    {label:'Comp.',   ax:-1,ay:0,  val:now.comp},
  ];
  function pt(val, ax, ay, r){ return {x:CX+ax*(val/100)*r, y:CY+ay*(val/100)*r}; }

  // Grid rings
  const gridRings = [25,50,75,100].map(v=>{
    const ps = axes.map(a=>pt(v,a.ax,a.ay,R));
    const d = ps.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ')+'Z';
    return `<path d="${d}" fill="none" stroke="var(--border)" stroke-width="${v===100?1:0.6}"/>`;
  }).join('');

  // Axis lines
  const axisLines = axes.map(a=>{
    const p=pt(100,a.ax,a.ay,R);
    return `<line x1="${CX}" y1="${CY}" x2="${p.x}" y2="${p.y}" stroke="var(--border)" stroke-width="0.8"/>`;
  }).join('');

  // Prev polygon (ghost)
  const prevPoly = prev ? (()=>{
    const ps=axes.map((a,i)=>pt(Object.values(prev)[i]||0,a.ax,a.ay,R));
    const d=ps.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ')+'Z';
    return `<path d="${d}" fill="var(--txt)" fill-opacity="0.06" stroke="var(--txt3)" stroke-width="1.5" stroke-dasharray="3,3"/>`;
  })() : '';

  // Now polygon
  const nowPs = axes.map(a=>pt(a.val,a.ax,a.ay,R));
  const nowD = nowPs.map((p,i)=>i===0?`M${p.x},${p.y}`:`L${p.x},${p.y}`).join(' ')+'Z';
  const nowPoly = `<path d="${nowD}" fill="var(--txt)" fill-opacity="0.12" stroke="var(--txt)" stroke-width="2"/>`;
  const nowDots = nowPs.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="var(--bg)" stroke="var(--txt)" stroke-width="2"/>`).join('');

  // Labels
  const H=320;
  const labelOffset=16;
  const labels = axes.map(a=>{
    const p=pt(100+labelOffset/R*100,a.ax,a.ay,R);
    const anchor = a.ax<0?'end':a.ax>0?'start':'middle';
    return `<text x="${p.x}" y="${p.y+4}" font-size="11" fill="var(--txt2)" text-anchor="${anchor}" font-family="var(--font)">${a.label}</text>`;
  }).join('');

  const legendPrev = prev ? `<circle cx="8" cy="8" r="5" fill="var(--txt3)"/><text x="18" y="13" font-size="11" fill="var(--txt3)" font-family="var(--font)">Avant</text>` : '';
  const legendNow = `<circle cx="${prev?70:8}" cy="8" r="5" fill="var(--txt)" stroke="var(--txt)" stroke-width="2"/><text x="${prev?80:18}" y="13" font-size="11" fill="var(--txt)" font-family="var(--font)">Maintenant</text>`;

  return `<div style="margin-bottom:24px;animation:fadeUp .35s ease .2s both">
    <p style="font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px">Skill radar</p>
    <div style="background:var(--bg2);border-radius:var(--radius);padding:16px">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block">
        ${gridRings}${axisLines}${prevPoly}${nowPoly}${nowDots}${labels}
        <g transform="translate(${CX-60},${H-28})">${legendPrev}${legendNow}</g>
      </svg>
    </div>
  </div>`;
}

function exportData(){
  const data = btoa(JSON.stringify(S));
  const blob = new Blob([data],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'fec_backup_'+today()+'.txt';
  a.click();
}

function importData(){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt';
  input.onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try{
        S = JSON.parse(atob(ev.target.result));
        saveState();
        render();
        alert('Import réussi !');
      }catch(err){ alert('Erreur : fichier invalide'); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetData(){
  if(confirm('Réinitialiser toutes les données ? Cette action est irréversible.')){
    S = defaultState();
    saveState();
    render();
  }
}

// AUDIO ENGINE (Web Audio API — offline)
// ═══════════════════════════════════════
const AC = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function getAC(){ if(!audioCtx) audioCtx = new AC(); return audioCtx; }
function playTone(freq, type='sine', dur=0.15, vol=0.25){
  try{
    const ctx=getAC(), o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=type; o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function playCorrect(){ playTone(880,'sine',0.12); setTimeout(()=>playTone(1100,'sine',0.1),90); }
function playWrong(){ playTone(200,'sawtooth',0.25); }
function playRecord(){ [880,1046,1318].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.18),i*80)); }

}

let sceneTimerInterval = null;

function startSceneMode(){
  const scene = SCENES[Math.floor(Math.random()*SCENES.length)];
  drillState = {mode:'scene', scene, timeLeft:60, started:false, submitting:false, feedback:null, userText:''};
  render();
}

function renderSceneMode(m){
  const ds = drillState;
  document.getElementById('hdr-sub').textContent = 'Décris la scène';

  if(ds.feedback){
    renderSceneFeedback(m); return;
  }

  const rem = ds.timeLeft;
  const warn = rem<=15?'color:var(--red)':rem<=30?'color:var(--orange)':'';
  const pct = (rem/60)*100;

  m.innerHTML = `<div class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <button class="back-btn" onclick="exitSceneMode()">← Retour</button>
      <span class="timer-display" style="font-size:20px;${warn}">${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}</span>
    </div>
    <div style="height:4px;background:var(--bg3);border-radius:2px;margin-bottom:16px;overflow:hidden">
      <div style="height:4px;background:var(--txt);border-radius:2px;width:${pct}%;transition:width 1s linear"></div>
    </div>

    <img class="scene-img" src="${ds.scene.svg}" alt="scene" style="image-rendering:auto">

    <div style="margin-top:14px">
      <p style="font-size:12px;color:var(--txt3);margin-bottom:8px">Décris ce que tu vois en anglais :</p>
      <textarea id="scene-input" style="width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:var(--radius-sm);font-size:15px;font-family:var(--font);background:var(--bg);color:var(--txt);resize:none;height:110px;outline:none;line-height:1.5;transition:border-color .2s" placeholder="I can see... There is... The person is..." onfocus="this.style.borderColor='var(--txt)'" onblur="this.style.borderColor='var(--border2)'" onkeydown="if(event.key==='Enter'&&event.ctrlKey)submitScene()">${ds.userText}</textarea>
      <p style="font-size:11px;color:var(--txt3);margin-top:4px">Ctrl+Entrée pour valider</p>
    </div>

    ${!ds.started?`<button class="btn btn-primary" style="margin-top:12px" onclick="startSceneTimer()">Lancer le chrono</button>`
    :`<button class="btn btn-primary" style="margin-top:12px" onclick="submitScene()" ${ds.submitting?'disabled':''}>
      ${ds.submitting?'<div class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block;vertical-align:middle"></div> Analyse en cours...':'Valider ma description'}
    </button>`}
  </div>`;

  if(ds.started) setTimeout(()=>document.getElementById('scene-input')?.focus(),100);
}

function startSceneTimer(){
  drillState.started = true;
  if(sceneTimerInterval) clearInterval(sceneTimerInterval);
  sceneTimerInterval = setInterval(()=>{
    if(!drillState || drillState.mode!=='scene') return clearInterval(sceneTimerInterval);
    drillState.timeLeft--;
    if(drillState.timeLeft<=0){
      clearInterval(sceneTimerInterval);
      drillState.timeLeft=0;
      submitScene();
      return;
    }
    const timerEl = document.querySelector('.timer-display');
    const barEl = document.querySelector('[style*="transition:width 1s"]');
    if(timerEl){
      const rem=drillState.timeLeft;
      timerEl.textContent=`${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}`;
      timerEl.style.color=rem<=15?'var(--red)':rem<=30?'var(--orange)':'var(--txt)';
    }
    if(barEl) barEl.style.width=(drillState.timeLeft/60*100)+'%';
    drillState.userText=document.getElementById('scene-input')?.value||'';
  },1000);
  render();
}

async function submitScene(){
  if(drillState.submitting) return;
  clearInterval(sceneTimerInterval);
  drillState.userText = document.getElementById('scene-input')?.value || drillState.userText;
  if(!drillState.userText.trim()){ alert('Écris quelque chose d\'abord !'); return; }
  drillState.submitting = true;
  render();

  const text = drillState.userText;
  const hint = drillState.scene.hint;
  const timeUsed = 60 - drillState.timeLeft;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system:`Tu es un professeur d'anglais. Évalue la description en anglais d'une scène. Réponds UNIQUEMENT en JSON: {"score":0-10,"level":"A2/B1/B2/C1","correction":"correction courte max 1 phrase","tip":"conseil pratique max 1 phrase","good":"ce qui est bien max 1 phrase"}. Sois bref, direct, encourageant.`,
        messages:[{role:'user',content:`Scène: ${hint}\nTemps utilisé: ${timeUsed}s\nDescription de l'élève: "${text}"`}]
      })
    });
    const data = await res.json();
    const txt = data.content?.find(b=>b.type==='text')?.text||'{}';
    const clean = txt.replace(/```json|```/g,'').trim();
    const result = JSON.parse(clean);
    drillState.feedback = result;
    drillState.submitting = false;
    S.sceneDone = (S.sceneDone||0)+1;
    addXP(result.score>=7?15:result.score>=4?8:4);
    saveState();
    if(result.score>=8) launchConfetti();
    render();
  }catch(e){
    drillState.submitting=false;
    drillState.feedback={score:5,level:'?',correction:'Évaluation hors-ligne non disponible.',tip:'Continue à t\'entraîner !',good:'Tu as écrit en anglais — c\'est déjà bien.'};
    render();
  }
}

  m.innerHTML = `<div class="screen">

    <div style="text-align:center;margin-bottom:20px">

        ${ds.submitting?'<div class="spinner" style="width:18px;height:18px;border-width:2px;display:inline-block;vertical-align:middle"></div> Évaluation...':'Valider'}
      </button>`}
  </div>`;
}

function startTranslateTimer(){
  drillState.started=true;
  if(translateTimer) clearInterval(translateTimer);
  translateTimer = setInterval(()=>{
    if(!drillState||drillState.mode!=='translate') return clearInterval(translateTimer);
    drillState.timeLeft--;
    if(drillState.timeLeft<=0){ clearInterval(translateTimer); drillState.timeLeft=0; submitTranslate(); return; }
    const el=document.querySelector('.timer-display');
    if(el){ const r=drillState.timeLeft; el.textContent=`${Math.floor(r/60)}:${String(r%60).padStart(2,'0')}`; el.style.color=r<=20?'var(--red)':r<=40?'var(--orange)':'var(--txt)'; }
    drillState.userText=document.getElementById('tr-input')?.value||'';
  },1000);
  render();
}

async function submitTranslate(){
  if(drillState.submitting) return;
  clearInterval(translateTimer);
  drillState.userText = document.getElementById('tr-input')?.value || drillState.userText;
  if(!drillState.userText.trim()){ alert('Écris ta traduction !'); return; }
  drillState.submitting=true;
  render();

  const { fr, level } = drillState.sentence;
  const userTr = drillState.userText;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:400,
        system:`Tu es un professeur d'anglais. Évalue une traduction FR→EN. Réponds UNIQUEMENT en JSON: {"score":0-10,"correct":true/false,"reference":"une bonne traduction possible","error":"erreur principale en 1 phrase","tip":"conseil en 1 phrase"}. Sois concis.`,
        messages:[{role:'user',content:`Phrase originale (FR): "${fr}"\nNiveau cible: ${level}\nTraduction de l'élève: "${userTr}"`}]
      })
    });
    const data = await res.json();
    const txt = data.content?.find(b=>b.type==='text')?.text||'{}';
    const result = JSON.parse(txt.replace(/```json|```/g,'').trim());
    drillState.feedback=result;
    drillState.submitting=false;
    S.translateDone=(S.translateDone||0)+1;
    addXP(result.score>=7?12:result.score>=4?6:3);
    saveState();
    if(result.score>=9) launchConfetti();
    if(result.correct) playCorrect(); else playWrong();
    render();
  }catch(e){
    drillState.submitting=false;
    drillState.feedback={score:5,correct:false,reference:'Évaluation hors-ligne indisponible.',error:'',tip:'Continue à t\'entraîner !'};
    render();
  }
}

let blitzTimer=null;
let blitzShake=false;

function startBlitz(category){
  const words = shuffle([...BLITZ_DB[category]]);
  const dir = Math.random()>0.5?'en-fr':'fr-en'; // alternera à chaque mot
  drillState = {
    mode:'blitz', category, words, wi:0,
    score:0, timeLeft:60, started:false,
    currentDir:dir, input:'', error:false,
    wrongCount:0
  };
  render();
}

function renderBlitzMode(m){
  const ds=drillState;
  document.getElementById('hdr-sub').textContent='Blitz';

  if(!ds.started){
    const catLabels={transitions:'Transitions',connectors:'Connecteurs',adverbs:'Adverbes',idioms:'Expressions',business:'Business',mywords:'Mes mots'};
    const rec=(S.blitzRecords||{})[ds.category]||0;
    m.innerHTML=`<div class="screen" style="text-align:center;padding-top:40px">
      <p style="font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">${catLabels[ds.category]}</p>
      <p style="font-size:28px;font-weight:700;margin-bottom:6px">1 minute</p>
      <p style="font-size:14px;color:var(--txt2);margin-bottom:4px">Trouve le maximum de traductions</p>
      <p style="font-size:13px;color:var(--txt3);margin-bottom:32px">EN → FR  et  FR → EN  — alternance aléatoire</p>
      ${rec>0?`<div style="margin-bottom:28px"><p style="font-size:13px;color:var(--txt3)">Ton record</p><p style="font-size:40px;font-weight:700;font-family:var(--mono)">${rec}</p></div>`:''}
      <button class="btn btn-primary" style="max-width:200px;margin:0 auto" onclick="launchBlitz()">
        <span style="font-size:16px">GO</span>
      </button>
      <div style="margin-top:16px"><button class="back-btn" onclick="exitBlitz()">← Retour</button></div>
    </div>`;
    return;
  }

  if(ds.wi>=ds.words.length && ds.timeLeft>0){
    // All words done, loop
    drillState.words = shuffle([...BLITZ_DB[ds.category]]);
    drillState.wi = 0;
  }

  const word = ds.words[ds.wi%ds.words.length];
  const isEnFr = ds.currentDir==='en-fr';
  const question = isEnFr ? word.en : word.fr.split(',')[0].trim();
  const timerPct = (ds.timeLeft/60)*100;
  const timerColor = ds.timeLeft<=10?'var(--red)':ds.timeLeft<=20?'var(--orange)':'var(--txt)';

  m.innerHTML=`<div class="screen" style="padding-bottom:10px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <button class="back-btn" onclick="exitBlitz()">← Stop</button>
      <span style="font-size:22px;font-weight:700;font-family:var(--mono);color:${timerColor}" id="blitz-timer">${ds.timeLeft}</span>
    </div>
    <div class="blitz-timer-bar" style="margin-bottom:16px">
      <div class="blitz-timer-fill" id="blitz-bar" style="width:${timerPct}%;background:${timerColor}"></div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span class="blitz-hint">${isEnFr?'EN → FR':'FR → EN'}</span>
      <span style="font-size:22px;font-weight:700;font-family:var(--mono)">${ds.score}</span>
    </div>

    <div style="padding:24px 16px;text-align:center;background:var(--bg2);border-radius:var(--radius);margin-bottom:16px;${blitzShake?'animation:shake .3s ease':''}">
      <p class="blitz-word" id="blitz-word">${question}</p>
    </div>

    <input type="text" class="blitz-input" id="blitz-input" placeholder="${isEnFr?'Traduction française...':'English translation...'}"
      autocomplete="off" autocorrect="off" spellcheck="false"
      style="${ds.error?'border-color:var(--red);background:var(--red-bg)':''}"
      oninput="blitzCheck(this.value)"
      value="${ds.input}">

    <div style="text-align:center;margin-top:12px">
      <button style="background:none;border:none;font-size:13px;color:var(--txt3);cursor:pointer;font-family:var(--font);padding:6px 12px" onclick="blitzSkip()">Passer →</button>
    </div>
  </div>`;

  setTimeout(()=>{
    const inp=document.getElementById('blitz-input');
    if(inp){inp.focus();if(ds.input){inp.setSelectionRange(ds.input.length,ds.input.length);}}
  },50);
}

function launchBlitz(){
  drillState.started=true;
  if(blitzTimer) clearInterval(blitzTimer);
  blitzTimer=setInterval(()=>{
    if(!drillState||drillState.mode!=='blitz') return clearInterval(blitzTimer);
    drillState.timeLeft--;
    const timerEl=document.getElementById('blitz-timer');
    const barEl=document.getElementById('blitz-bar');
    const col=drillState.timeLeft<=10?'var(--red)':drillState.timeLeft<=20?'var(--orange)':'var(--txt)';
    if(timerEl){timerEl.textContent=drillState.timeLeft;timerEl.style.color=col;}
    if(barEl){barEl.style.width=(drillState.timeLeft/60*100)+'%;';barEl.style.background=col;}
    if(drillState.timeLeft<=0){clearInterval(blitzTimer);finishBlitz();}
  },1000);
  render();
}

function blitzCheck(val){
  drillState.input=val;
  const word=drillState.words[drillState.wi%drillState.words.length];
  const isEnFr=drillState.currentDir==='en-fr';
  // Acceptable answers
  const answers = isEnFr
    ? word.fr.toLowerCase().split(',').map(s=>s.trim()).filter(Boolean)
    : word.en.toLowerCase().split(',').map(s=>s.trim()).filter(Boolean).concat(
        word.en.toLowerCase().split('/').map(s=>s.trim())
      );

  const userVal = val.toLowerCase().trim();
  const isCorrect = answers.some(a => {
    if(a===userVal) return true;
    if(a.includes(userVal) && userVal.length>=3 && a.startsWith(userVal)) return true;
    return false;
  });

  if(isCorrect){
    playCorrect();
    drillState.score++;
    drillState.input='';
    drillState.error=false;
    // Alternate direction randomly with 60% chance to switch
    drillState.currentDir=Math.random()>0.4?(drillState.currentDir==='en-fr'?'fr-en':'en-fr'):drillState.currentDir;
    drillState.wi++;
    blitzShake=false;

    // Flash score
    const scoreEl=document.querySelector('.blitz-word')?.parentElement?.nextElementSibling?.nextElementSibling;
    const wordBox=document.getElementById('blitz-word');
    if(wordBox){wordBox.parentElement.style.background='var(--green-bg)';setTimeout(()=>{if(wordBox)wordBox.parentElement.style.background='var(--bg2)';},200);}

    render();
    return;
  }

  // Wrong — show red briefly if > 4 chars and no match
  if(userVal.length>=4){
    const inp=document.getElementById('blitz-input');
    if(inp&&!drillState.error){
      drillState.error=true;
      setTimeout(()=>{drillState.error=false;},600);
    }
  } else {
    drillState.error=false;
  }
}

function blitzSkip(){
  drillState.input='';
  drillState.error=false;
  drillState.currentDir=Math.random()>0.5?'en-fr':'fr-en';
  drillState.wi++;
  render();
}

function finishBlitz(){
  clearInterval(blitzTimer);
  const cat=drillState.category;
  const score=drillState.score;
  if(!S.blitzRecords) S.blitzRecords={};
  const isRecord = score > (S.blitzRecords[cat]||0);
  if(isRecord){
    S.blitzRecords[cat]=score;
    playRecord();
    launchConfetti();
  }
  addXP(score*2);
  saveState();
  drillState={mode:'blitz-result',score,category:cat,isRecord,prev:S.blitzRecords[cat]};
  render();
}

function renderBlitzResult(m){
  const ds=drillState;
  const catLabels={transitions:'Transitions',connectors:'Connecteurs',adverbs:'Adverbes',idioms:'Expressions',business:'Business'};

function exitBlitz(){
  clearInterval(blitzTimer);
  drillState=null;
  currentView='modes';
  render();
}

// QUICK WIN — suggestion anti-friction
// ═══════════════════════════════════════
function getQuickWinSuggestion(){
  const hour = new Date().getHours();
  const recs = S.blitzRecords||{};
  const cats = Object.keys(BLITZ_DB);
  const unbeaten = cats.find(c=>!recs[c]||recs[c]<5);
  if(unbeaten) return {text:`2 min · Blitz ${unbeaten} — ton record est ${recs[unbeaten]||0}`,action:`startBlitz('${unbeaten}')`};
  if(hour>=7&&hour<=9) return {text:'Matin idéal pour 1 Pressure test — 6 min',action:"currentView='drill';render()"};
  return {text:'1 scène à décrire · Améliore ton oral',action:'startSceneMode()'};
}

function lookupOffline(word){
  const w = word.toLowerCase().trim();
  return MINI_DICT[w] || null;
}

async function lookupAI(word){
  if(!getApiKey()) return null;
  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:250,
        system:`Tu es un dictionnaire anglais-français. Réponds UNIQUEMENT en JSON valide sans markdown: {"fr":"traduction courte","pos":"n/v/adj/adv/conj/expr","level":"A2/B1/B2/C1/C2","example":"1 phrase anglaise naturelle courte","exampleFr":"sa traduction"}`,
        messages:[{role:'user',content:`Mot: "${word}"`}]
      })
    });
    const data = await res.json();
    const txt = data.content?.find(b=>b.type==='text')?.text||'{}';
    return JSON.parse(txt.replace(/```json|```/g,'').trim());
  }catch(e){ return null; }
}

async function doLookup(){
  const input=document.getElementById('lookup-word');
  if(!input) return;
  const word=input.value.trim().toLowerCase();
  if(!word) return;
  drillState.word=word;
  drillState.loading=true;
  drillState.result=null;
  drillState.saved=false;
  render();

  // Offline first
  let result=lookupOffline(word);
  if(!result) result=await lookupAI(word);
  if(!result) result={fr:'Mot non trouvé',pos:'?',level:'?',example:'',exampleFr:''};

  drillState.loading=false;
  drillState.result=result;
  render();
}

function saveMyWord(){
  const ds=drillState;
  if(!ds.result||!ds.word) return;
  const id='mw_'+ds.word.replace(/\s+/g,'_');
  if(!S.myWords) S.myWords={};
  S.myWords[id]={
    id, word:ds.word, fr:ds.result.fr, pos:ds.result.pos||'',
    level:ds.result.level||'?', example:ds.result.example||'',
    exampleFr:ds.result.exampleFr||'', addedAt:new Date().toISOString(),
    source:''
  };
  // Init FSRS card for this word
  if(!S.cards[id]) S.cards[id]=FSRS.initCard();
  addXP(3);
  saveState();
  ds.saved=true;
  playCorrect();
  render();
}

function renderWordCardMini(w){
  const card=S.cards[w.id];
  const stateClass=!card||card.state==='new'?'word-card-new':card.reps>=3?'mastered':'learning';
  return `<div class="word-card ${stateClass}" onclick="startWordLookup();drillState.word='${w.word}';drillState.result={fr:'${w.fr.replace(/'/g,"\\'")}',pos:'${w.pos}',level:'${w.level}',example:'${(w.example||'').replace(/'/g,"\\'")}',exampleFr:'${(w.exampleFr||'').replace(/'/g,"\\'")}',saved:true}">

function toggleFavorite(id,e){
  if(e) e.stopPropagation();
  if(!S.favorites) S.favorites={};
  if(S.favorites[id]) delete S.favorites[id]; else S.favorites[id]=true;
  saveState();
  // Re-render just the fav button without full render
  const btn=document.querySelector(`[data-fav="${id}"]`);
  if(btn){const on=!!S.favorites[id];btn.classList.toggle('active',on);btn.querySelector('svg').setAttribute('fill',on?'currentColor':'none');}
}
function isFav(id){return !!(S.favorites&&S.favorites[id]);}
function favIcon(id){
  const on=isFav(id);

// WEB SPEECH — Écoute & répète
// ═══════════════════════════════════════
function speak(text,onEnd){
  if(!S.speechEnabled||!window.speechSynthesis){onEnd&&onEnd();return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.88;u.pitch=1;
  const voices=window.speechSynthesis.getVoices();
  const en=voices.find(v=>v.lang.startsWith('en')&&v.localService)||voices.find(v=>v.lang.startsWith('en'));
  if(en) u.voice=en;
  u.onend=()=>onEnd&&onEnd();
  window.speechSynthesis.speak(u);
}
function startListenRepeat(){
  const pool=shuffle(getAllCards()).slice(0,10).map(c=>({id:c.id,en:c.display||c.word||c.infinitive,fr:c.fr,example:c.example||''}));
  drillState={mode:'listen',cards:pool,ci:0,phase:'listen',listening:false};
  render();
}
function renderListenMode(m){
  const ds=drillState;
  if(ds.ci>=ds.cards.length){addXP(20);saveState();drillState=null;currentView='drill';render();return;}
  const card=ds.cards[ds.ci];
  document.getElementById('hdr-sub').textContent='Écoute & répète';
  m.innerHTML=`<div class="screen" style="text-align:center">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <button class="back-btn" onclick="exitDrill()">← Retour</button>
      <span style="font-size:13px;color:var(--txt3)">${ds.ci+1}/${ds.cards.length}</span>
    </div>
    <div class="progress-track" style="margin-bottom:32px"><div class="progress-fill" style="width:${Math.round(ds.ci/ds.cards.length*100)}%"></div></div>
    <div style="padding:32px 20px;background:var(--bg2);border-radius:var(--radius);margin-bottom:24px;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center">
      ${ds.phase==='listen'?`
        <p style="font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px">Écoute</p>
        <p style="font-size:36px;font-weight:700;margin-bottom:8px">${card.en}</p>
        <p style="font-size:15px;color:var(--txt2)">${card.fr}</p>
        ${ds.listening?`<div class="speech-wave" style="margin-top:16px"><span></span><span></span><span></span></div>`:''}
      `:`
        <p style="font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px">Répète à voix haute</p>
        <p style="font-size:36px;font-weight:700;margin-bottom:12px">${card.en}</p>
        <p style="font-size:13px;color:var(--txt3);font-style:italic;line-height:1.4;max-width:260px">${card.example}</p>
      `}
    </div>
    ${ds.phase==='listen'?`
      <button class="btn btn-primary" onclick="listenPlay()" ${ds.listening?'disabled':''}>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="vertical-align:middle;margin-right:6px"><path d="M3 2l9 5-9 5V2z" fill="currentColor"/></svg>
        ${ds.listening?'Lecture...':'Écouter'}
      </button>
      ${!ds.listening?`<button class="btn btn-ghost" style="margin-top:8px" onclick="listenSkip()">Passer</button>`:''}
    `:`<button class="btn btn-primary" onclick="listenNext()">Suivant →</button>`}
  </div>`;
}
function listenPlay(){drillState.listening=true;render();speak(drillState.cards[drillState.ci].en,()=>{if(drillState&&drillState.mode==='listen'){drillState.listening=false;drillState.phase='repeat';render();}});}
function listenNext(){drillState.ci++;drillState.phase='listen';drillState.listening=false;render();}
function listenSkip(){drillState.phase='repeat';drillState.listening=false;render();}

// ═══════════════════════════════════════
// PWA NOTIFICATIONS
// ═══════════════════════════════════════
const NOTIF_MSGS=[
  '2 minutes suffisent. Lance un Blitz maintenant.',
  'Ton niveau {level} peut encore progresser ce soir.',
  'Série : {streak} jours. Garde le rythme.',
  'Un mot de transition t\'attend. 60 secondes.',
  'Ouvre l\'app, fais une scène. C\'est tout.',
  'Les verbes irréguliers ne se mémorisent pas seuls.',
  'Aujourd\'hui : 1 Blitz = 2 min = des mots en plus.',
];
async function requestNotifPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission==='granted') return true;
  return (await Notification.requestPermission())==='granted';
}
function scheduleNotification(){
  if(!S.notifEnabled||!('Notification' in window)||Notification.permission!=='granted') return;
  clearTimeout(window._notifTimeout);
  const [h,min]=(S.notifTime||'20:00').split(':').map(Number);
  const target=new Date();target.setHours(h,min,0,0);
  if(target<=new Date()) target.setDate(target.getDate()+1);
  window._notifTimeout=setTimeout(()=>{
    const msg=NOTIF_MSGS[Math.floor(Math.random()*NOTIF_MSGS.length)].replace('{level}',S.level||'B1').replace('{streak}',S.streak||1);
    new Notification('Finance Commando',{body:msg,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%23111"/><text x="16" y="22" font-size="14" text-anchor="middle" fill="white" font-weight="bold">FC</text></svg>'});
    scheduleNotification(); // reschedule for next day
  },target-new Date());
}
async function toggleNotif(){
  if(!S.notifEnabled){
    const ok=await requestNotifPermission();
    if(!ok){alert('Autorise les notifications dans les réglages de ton navigateur.');return;}
    S.notifEnabled=true;
  } else {
    S.notifEnabled=false;
    clearTimeout(window._notifTimeout);
  }
  saveState();scheduleNotification();render();
}
function renderNotifSettings(){
  const supported='Notification' in window;
  const perm=supported?Notification.permission:'none';
  return `<div style="padding:16px;background:var(--bg2);border-radius:var(--radius);margin-bottom:20px">
    <p style="font-size:12px;color:var(--txt3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px">Rappel quotidien</p>
    ${!supported?`<p style="font-size:13px;color:var(--txt3)">Non supporté sur ce navigateur.</p>`:`
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:14px">Activer les rappels</span>
        <button class="toggle ${S.notifEnabled?'on':''}" onclick="toggleNotif()"></button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0">
        <span style="font-size:14px;color:${S.notifEnabled?'var(--txt)':'var(--txt3)'}">Heure du rappel</span>
        <input type="time" value="${S.notifTime||'20:00'}" style="font-size:14px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:4px 8px;color:var(--txt);font-family:var(--font);outline:none;${S.notifEnabled?'':'opacity:.4;pointer-events:none'}" onchange="S.notifTime=this.value;saveState();scheduleNotification()">
      </div>
      ${perm==='denied'?`<p style="font-size:12px;color:var(--orange);margin-top:4px;line-height:1.4">Notifications bloquées dans le navigateur.</p>`:''}
      ${perm==='granted'&&S.notifEnabled?`<p style="font-size:12px;color:var(--green-txt);margin-top:4px">Rappel programmé à ${S.notifTime||'20:00'} chaque soir.</p>`:''}
    `}
  </div>`;
}

document.addEventListener('keydown', e => {
  if(!drillState) return;
  if(drillState.mode==='pressure' && drillState.revealed){
    if(e.key==='1') ratePressure(1);
    else if(e.key==='2') ratePressure(2);
    else if(e.key==='3') ratePressure(3);
    else if(e.key==='4') ratePressure(4);
    else if(e.key===' ' || e.key==='Enter') revealPressure();
  }
  if(drillState.mode==='pressure' && !drillState.revealed){
    if(e.key===' ' || e.key==='Enter'){ e.preventDefault(); revealPressure(); }
  }
});

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
// Ensure new fields exist on old saves
if(S.favorites===undefined) S.favorites={};
if(S.activityLog===undefined) S.activityLog=[];
if(S.notifTime===undefined) S.notifTime='20:00';
if(S.notifEnabled===undefined) S.notifEnabled=false;
if(S.speechEnabled===undefined) S.speechEnabled=true;
if(S.darkMode===undefined) S.darkMode=true;
if(S.myWords===undefined) S.myWords={};

// Log today as active
(function logToday(){
  const t=today();
  if(!S.activityLog.includes(t)){ S.activityLog.push(t); if(S.activityLog.length>90) S.activityLog=S.activityLog.slice(-90); saveState(); }
})();

document.documentElement.setAttribute('data-theme', S.darkMode?'dark':'');
document.getElementById('dm-btn').textContent = S.darkMode?'light':'dark';
scheduleNotification();
render();
</script>
</body>
</html>
